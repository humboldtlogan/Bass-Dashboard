<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bass Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <h1>Bass Dashboard</h1>
    <p>Congress, House, Senate, and Supreme Court updates</p>
  </header>

  <main>
    <section class="controls">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="congress">Congress</button>
      <button class="filter-btn" data-filter="house">House</button>
      <button class="filter-btn" data-filter="senate">Senate</button>
      <button class="filter-btn" data-filter="court">Supreme Court</button>
    </section>

    <section id="feed" class="feed">
      <p class="loading">Loading feed...</p>
    </section>
  </main>

  <footer>
    <p>Personal command center · Public government sources</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
