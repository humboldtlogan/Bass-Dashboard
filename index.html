<!DOCTYPE html>
<html>
<head>
  <title>Bass Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 5px;
    }

    .grid {
      display: grid;
      gap: 16px;
      margin-top: 20px;
    }

    .card {
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 16px;
    }

    a {
      color: #8ab4ff;
    }
  </style>
</head>

<body>
  <h1>Bass Dashboard</h1>
  <p>Personal command center.</p>

  <div class="grid">
    <div class="card">
      <h2>Government</h2>
      <p>Congress, Senate, House, and Supreme Court feeds will go here.</p>
      <a href="https://www.congress.gov/" target="_blank">Congress.gov</a>
    </div>

    <div class="card">
      <h2>Astronomy</h2>
      <p>Moon phase, weather, and sky conditions will go here.</p>
    </div>

    <div class="card">
      <h2>Life</h2>
      <p>Calendar, reminders, and personal systems will go here.</p>
    </div>
  </div>
</body>
</html>
